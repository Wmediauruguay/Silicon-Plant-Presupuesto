<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Silicon Plant · Presupuesto Residencial</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --white:#fff;--bg:#f4f4f4;--t1:#1b1b1b;--t2:#393c41;
  --t3:#5c5e62;--t4:#bcbec1;--border:#e5e5ea;
  --accent:#3882bd;--navy:#28435a;
  --font:'Plus Jakarta Sans',-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--white);color:var(--t1);}
.hidden{display:none!important;}
.screen{min-height:100vh;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:inline-flex;align-items:center;gap:9px;}
.logo-text{font-size:11px;font-weight:700;letter-spacing:2.5px;}
.dots{display:flex;gap:6px;align-items:center;}
.dot{height:7px;border-radius:4px;background:var(--border);transition:all .3s;}
.dot.active{background:var(--t1);}
.dot.done{background:#888;}

/* CONFIG */
.cfg-body{max-width:640px;margin:0 auto;padding:52px 24px 110px;}
.slabel{font-size:11px;letter-spacing:4px;color:var(--t4);text-transform:uppercase;margin-bottom:12px;}
.stitle{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;}
.ssub{font-size:14px;color:var(--t3);margin-bottom:36px;}

/* SIZE */
.size-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sc{padding:24px 20px;border-radius:6px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);transition:all .15s;user-select:none;}
.sc:hover{border-color:#888;}
.sc.sel{background:var(--t1);border-color:var(--t1);}
.sc .sl{font-size:32px;font-weight:800;margin-bottom:4px;}
.sc .sr{font-size:13px;font-weight:600;margin-bottom:3px;color:var(--t2);}
.sc .sd{font-size:12px;color:var(--t4);}
.sc.sel .sl,.sc.sel .sr{color:#fff;}
.sc.sel .sd{color:rgba(255,255,255,.5);}
.slider-wrap{background:var(--bg);border-radius:6px;padding:20px;}
.srow{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;}
.skw{font-size:36px;font-weight:800;letter-spacing:-1px;}
.skw span{font-size:15px;font-weight:400;color:var(--t3);margin-left:4px;}
input[type=range]{width:100%;accent-color:var(--t1);cursor:pointer;}

/* PANELS */
.plist{display:flex;flex-direction:column;gap:10px;}
.pc{padding:20px 22px;border-radius:6px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;gap:20px;transition:all .15s;}
.pc:hover{border-color:#888;}
.pc.sel{border-color:var(--t1);}
.pcells{display:flex;flex-wrap:wrap;gap:2px;width:80px;flex-shrink:0;}
.cell{width:12px;height:18px;border-radius:1.5px;}
.pname{font-size:16px;font-weight:700;margin-bottom:3px;}
.pbrand{font-size:12px;color:var(--t3);margin-bottom:2px;}
.pwatt{font-size:12px;color:var(--t4);}
.chk{width:22px;height:22px;border-radius:50%;margin-left:auto;flex-shrink:0;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pc.sel .chk{background:var(--t1);border-color:var(--t1);}

/* BATTERY */
.blist{display:flex;flex-direction:column;gap:10px;}
.bc{padding:22px;border-radius:6px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);transition:all .15s;}
.bc:hover{border-color:#888;}
.bc.sel{border-color:var(--t1);}
.bname{font-size:16px;font-weight:700;margin-bottom:3px;}
.bsub{font-size:13px;color:var(--t3);}
.btag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:10px;text-transform:uppercase;margin-left:8px;}
.tag-s{background:#e8f4f0;color:#2a7a5a;}
.tag-p{background:#e8effa;color:#2860a8;}
.bfeats{margin-top:8px;display:flex;flex-direction:column;gap:3px;}
.bfeat{font-size:12px;color:var(--t4);padding-left:12px;position:relative;}
.bfeat::before{content:"·";position:absolute;left:0;}
.bcargas{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.cargas-label{font-size:10px;letter-spacing:2px;color:var(--t4);text-transform:uppercase;margin-bottom:8px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--bg);color:var(--t2);}

/* NAV BTNS */
.snav{display:flex;justify-content:space-between;margin-top:28px;}
.btn-back{background:transparent;color:var(--t3);border:1px solid var(--border);padding:12px 24px;border-radius:4px;font-size:13px;cursor:pointer;font-family:var(--font);}
.btn-next{background:var(--t1);color:#fff;border:none;padding:12px 32px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .15s;}
.btn-next:disabled{background:var(--t4);cursor:not-allowed;}

/* BOTTOM BAR */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.bchips{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.bprice{text-align:right;flex-shrink:0;}
.bprice .pl{font-size:10px;color:var(--t4);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.bprice .pv{font-size:15px;font-weight:700;}
.btn-gen{background:var(--t1);color:#fff;border:none;padding:12px 28px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0;transition:opacity .15s;}
.btn-gen:disabled{background:var(--t4);cursor:not-allowed;}
.btn-gen:not(:disabled):hover{opacity:.85;}

/* LOADING */
#screen-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lsteps{display:flex;flex-direction:column;gap:20px;width:270px;margin-top:48px;}
.li{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--t4);}
.li.active{color:var(--t1);font-weight:600;}
.spin{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);border-top-color:var(--t1);animation:spin .9s linear infinite;flex-shrink:0;}
.ddot{width:20px;height:20px;border-radius:50%;background:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wdot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* PROPOSAL */
.hero{position:relative;height:100vh;min-height:560px;background:#111;overflow:hidden;}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 42%;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,transparent 40%,rgba(0,0,0,.62) 100%);}
.hero-nav{position:absolute;top:0;left:0;right:0;padding:22px 40px;display:flex;justify-content:space-between;align-items:center;z-index:2;}
.logo-light{color:#fff;}
.hero-date{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;}
.hero-content{position:absolute;bottom:0;left:0;right:0;text-align:center;padding:0 24px 56px;color:#fff;z-index:2;}
.hero-tag{font-size:11px;letter-spacing:5px;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:14px;}
.hero-title{font-size:44px;font-weight:800;line-height:1.05;letter-spacing:-1px;margin-bottom:10px;}
.hero-sub{font-size:16px;color:rgba(255,255,255,.6);margin-bottom:32px;}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-hp{background:rgba(255,255,255,.95);color:var(--t1);padding:12px 32px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);}
.btn-hs{background:rgba(255,255,255,.12);color:#fff;padding:12px 32px;border-radius:4px;font-size:13px;border:1px solid rgba(255,255,255,.25);cursor:pointer;font-family:var(--font);}

.statsbar{border-bottom:1px solid var(--border);}
.sgrid{max-width:900px;margin:0 auto;display:grid;}
.scell{padding:26px 20px;text-align:center;border-right:1px solid var(--border);}
.scell:last-child{border-right:none;}
.sl2{font-size:10px;letter-spacing:2px;color:var(--t4);text-transform:uppercase;margin-bottom:8px;}
.sv{font-size:16px;font-weight:700;}

.pbody{max-width:760px;margin:0 auto;padding:64px 32px 80px;}
.seclabel{font-size:10px;letter-spacing:4px;color:var(--t4);text-transform:uppercase;margin-bottom:24px;text-align:center;}
.narr{font-size:17px;color:var(--t3);line-height:1.9;text-align:center;max-width:600px;margin:0 auto 64px;padding-bottom:64px;border-bottom:1px solid var(--border);}

.gallery{margin-bottom:64px;}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;border-radius:8px;overflow:hidden;}
.gimg{position:relative;aspect-ratio:16/10;overflow:hidden;background:var(--bg);}
.gimg img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s;}
.gimg:hover img{transform:scale(1.04);}
.gcap{position:absolute;bottom:0;left:0;right:0;padding:20px 14px 10px;background:linear-gradient(transparent,rgba(0,0,0,.5));font-size:11px;color:rgba(255,255,255,.8);}

.invest{text-align:center;padding:56px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:56px;}
.iamt{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:8px;}
.isep{color:var(--t4);font-weight:200;font-size:40px;margin:0 10px;}
.inote{font-size:12px;color:var(--t4);margin-top:6px;margin-bottom:24px;}
.ipill{display:inline-flex;align-items:center;gap:0;padding:14px 28px;background:var(--bg);border-radius:4px;}
.ipitem{text-align:center;padding:0 16px;}
.ipitem:not(:last-child){border-right:1px solid var(--border);}
.ipl{font-size:10px;letter-spacing:1px;color:var(--t4);text-transform:uppercase;margin-bottom:3px;}
.ipv{font-size:15px;font-weight:700;}

.specs{margin-bottom:56px;}
.specrow{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--border);}
.spL{font-size:15px;color:var(--t3);}
.spV{font-size:15px;font-weight:600;}

/* Battery section */
.batsec{background:var(--bg);padding:48px 40px;border-radius:4px;margin-bottom:56px;}
.batsec-hdr{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px;}
.btype-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.btype-sub{font-size:13px;color:var(--t3);margin-bottom:14px;}
.bfeatlist{display:flex;flex-direction:column;gap:6px;}
.bfeat2{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:8px;}
.bfeat2::before{content:"✓";color:var(--accent);font-weight:700;font-size:12px;}
.ctitle{font-size:10px;letter-spacing:3px;color:var(--t4);text-transform:uppercase;margin-bottom:16px;padding-top:20px;border-top:1px solid var(--border);}
.cgrid{display:flex;flex-wrap:wrap;gap:12px;}
.citem{display:flex;flex-direction:column;align-items:center;gap:5px;width:70px;}
.cicon{width:44px;height:44px;border-radius:10px;background:var(--white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;}
.clabel{font-size:10px;color:var(--t3);text-align:center;line-height:1.3;}
.citem.off .cicon{opacity:.25;}
.citem.off .clabel{color:var(--t4);}

.difgrid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:56px;}
.dift{font-size:14px;font-weight:700;margin-bottom:6px;}
.difd{font-size:13px;color:var(--t3);line-height:1.7;}

.pasos{margin-bottom:56px;}
.paso{display:flex;gap:24px;padding-bottom:28px;margin-bottom:28px;border-bottom:1px solid var(--border);}
.paso:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.pnum{font-size:13px;font-weight:700;color:var(--t4);min-width:24px;padding-top:2px;}
.pt{font-size:15px;font-weight:700;margin-bottom:5px;}
.pd{font-size:13px;color:var(--t3);line-height:1.7;}

.projs{padding:64px 0;border-top:1px solid var(--border);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:32px;}
.pcard{}
.pimg{border-radius:4px;overflow:hidden;aspect-ratio:16/10;position:relative;}
.pimg img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.pcard:hover .pimg img{transform:scale(1.03);}
.pmeta{padding:14px 0 0;}
.pname2{font-size:14px;font-weight:700;margin-bottom:4px;}
.pdet{font-size:12px;color:var(--t3);}

.footer{background:var(--t1);color:#fff;padding:64px 40px;text-align:center;}
.ftitle{font-size:28px;font-weight:700;letter-spacing:-.5px;margin:24px 0 8px;}
.fsub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:36px;max-width:380px;margin-left:auto;margin-right:auto;line-height:1.7;}
.fbtns{display:flex;gap:12px;justify-content:center;margin-bottom:48px;}
.btn-fp{background:#fff;color:var(--t1);padding:13px 32px;border-radius:4px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);}
.btn-fs{background:transparent;color:rgba(255,255,255,.5);padding:13px 32px;border-radius:4px;font-size:14px;border:1px solid rgba(255,255,255,.15);cursor:pointer;font-family:var(--font);}
.flegal{padding-top:32px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.2);line-height:1.8;}

/* ══ HOME SCREEN ══════════════════════════════════════════════════════ */
.home-hero{position:relative;height:100vh;min-height:580px;overflow:hidden;background:#111;}
.home-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 45%;}
.home-hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.08) 0%,transparent 35%,rgba(0,0,0,.55) 100%);}
.home-nav{position:absolute;top:0;left:0;right:0;padding:22px 40px;display:flex;justify-content:space-between;align-items:center;z-index:2;}
.home-hero-content{position:absolute;bottom:0;left:0;right:0;text-align:center;padding:0 24px 64px;z-index:2;color:#fff;}
.home-eyebrow{font-size:11px;letter-spacing:5px;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:16px;}
.home-title{font-size:48px;font-weight:800;letter-spacing:-1.5px;line-height:1.05;margin-bottom:14px;}
.home-sub{font-size:16px;color:rgba(255,255,255,.6);margin-bottom:36px;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.6;}
.btn-home-cta{background:rgba(255,255,255,.95);color:#1b1b1b;padding:14px 40px;border-radius:4px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);letter-spacing:.3px;transition:opacity .15s;}
.btn-home-cta:hover{opacity:.88;}

/* Projects section on home */
.home-projs{padding:80px 32px 80px;}
.home-projs-inner{max-width:1080px;margin:0 auto;}
.home-projs-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:36px;}
.home-projs-title{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.home-projs-label{font-size:11px;letter-spacing:3px;color:var(--t4);text-transform:uppercase;}
.hpgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.hpcard{position:relative;overflow:hidden;cursor:default;background:var(--bg);}
.hpcard:nth-child(1){aspect-ratio:16/10;}
.hpcard:nth-child(2){aspect-ratio:16/10;}
.hpcard:nth-child(3){aspect-ratio:16/10;}
.hpcard:nth-child(4){aspect-ratio:16/10;}
.hpcard img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.25,.46,.45,.94);}
.hpcard:hover img{transform:scale(1.04);}
.hpcard-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 45%,rgba(0,0,0,.55) 100%);transition:opacity .3s;}
.hpcard:hover .hpcard-ov{opacity:.85;}
.hpcard-info{position:absolute;bottom:0;left:0;right:0;padding:24px 22px 18px;}
.hpcard-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;}
.hpcard-det{font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.3px;}
.hpcard-kw{display:inline-block;margin-top:6px;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;background:rgba(255,255,255,.1);padding:3px 10px;border-radius:10px;backdrop-filter:blur(4px);}

/* Home footer strip */
.home-footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;}
.home-footer-legal{font-size:11px;color:var(--t4);}
